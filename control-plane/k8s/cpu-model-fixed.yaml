apiVersion: apps/v1
kind: Deployment
metadata:
  name: vajra-cpu-model
  namespace: vajra-system
  labels:
    app: vajra-cpu-model
    component: cpu-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vajra-cpu-model
  template:
    metadata:
      labels:
        app: vajra-cpu-model
    spec:
      containers:
      - name: cpu-model
        image: aayud/vajra-cpu-model:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_NAME
          value: "microsoft/Phi-3-mini-4k-instruct"
        - name: NUM_CPU_THREADS
          value: "2"  # Reduced threads to save memory
        - name: OMP_NUM_THREADS
          value: "2"  # Reduced threads
        - name: TRANSFORMERS_CACHE
          value: "/tmp/cache"  # Use temp dir for cache
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "3Gi"    # Increased from 2Gi
            cpu: "500m"      # Reduced CPU request
          limits:
            memory: "4Gi"    # Keep at 4Gi
            cpu: "2000m"     # Keep CPU limit
---
apiVersion: v1
kind: Service
metadata:
  name: vajra-cpu-model
  namespace: vajra-system
spec:
  selector:
    app: vajra-cpu-model
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
