apiVersion: apps/v1
kind: Deployment
metadata:
  name: vajra-cpu-model
  namespace: vajra-system
  labels:
    app: vajra-cpu-model
    component: cpu-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vajra-cpu-model
  template:
    metadata:
      labels:
        app: vajra-cpu-model
    spec:
      # FIXED: Add anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vajra-cpu-model
              topologyKey: kubernetes.io/hostname
      containers:
      - name: cpu-model
        image: aayud/vajra-cpu-model:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_NAME
          value: "microsoft/Phi-3-mini-4k-instruct"
        - name: NUM_CPU_THREADS
          value: "4"
        - name: OMP_NUM_THREADS
          value: "4"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: vajra-cpu-model
  namespace: vajra-system
spec:
  selector:
    app: vajra-cpu-model
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

