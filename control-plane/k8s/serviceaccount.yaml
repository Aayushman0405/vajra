apiVersion: v1
kind: ServiceAccount
metadata:
  name: vajra-sa
  namespace: vajra-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vajra-controller
  namespace: vajra-system
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vajra-controller-binding
  namespace: vajra-system
subjects:
- kind: ServiceAccount
  name: vajra-sa
  namespace: vajra-system
roleRef:
  kind: Role
  name: vajra-controller
  apiGroup: rbac.authorization.k8s.io

